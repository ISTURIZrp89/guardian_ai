plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.guardianai.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "26.1.10909125"  // NDK LTS compatible con llama.cpp

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.guardianai.app"
        minSdk = 24                         // Android 7+ (llama.cpp requiere >=24)
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // ABI: arm64-v8a (móviles modernos), x86_64 (emulador)
        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }

        // Configuración de CMake para compilar llama.cpp
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -O3 -ffast-math"
                arguments "-DANDROID_STL=c++_shared",
                          "-DLLAMA_BUILD_TESTS=OFF",
                          "-DLLAMA_BUILD_EXAMPLES=OFF"
            }
        }
    }

    // Indicar a Gradle dónde está el CMakeLists.txt
    externalNativeBuild {
        cmake {
            path "../android/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
    }
}

flutter {
    source = "../.."
}
